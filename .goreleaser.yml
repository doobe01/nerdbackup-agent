version: 2

builds:
  - id: agent
    main: ./cmd/nerdbackup-agent
    binary: nerdbackup-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: installer
    main: ./cmd/nerdbackup-installer
    binary: nerdbackup-installer
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w

archives:
  - id: agent-archives
    builds:
      - agent
    format: tar.gz
    name_template: "nerdbackup-agent_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: installer-archive
    builds:
      - installer
    format: binary
    name_template: "nerdbackup-installer_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github-native

release:
  header: |
    ## NerdBackup Agent {{ .Version }}

    See [CHANGELOG.md](https://github.com/doobe01/nerdbackup-agent/blob/main/CHANGELOG.md) for full details.

    ### Install

    ```bash
    # Linux / macOS
    curl -sSL https://nerdbackup.com/install.sh | sh

    # Windows (PowerShell)
    irm https://nerdbackup.com/install.ps1 | iex
    ```
