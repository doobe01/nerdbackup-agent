version: 2

builds:
  - main: ./cmd/nerdbackup-agent
    binary: nerdbackup-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github-native

release:
  header: |
    ## NerdBackup Agent {{ .Version }}

    See [CHANGELOG.md](https://github.com/doobe01/nerdbackup-agent/blob/main/CHANGELOG.md) for full details.

    ### Install

    **Windows:** Download `nerdbackup-agent-{{ .Version }}-windows-setup.exe` below (recommended) or use the zip.

    **Linux / macOS:**
    ```bash
    curl -sSL https://nerdbackup.com/install.sh | sh
    ```

    Or download from your [NerdBackup Dashboard](https://nerdbackup.com/dashboard/agents) for zero-touch install.
